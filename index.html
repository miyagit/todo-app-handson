<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODOアプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="app-header">
      <h1 class="app-title">マイTODO</h1>
      <p class="app-subtitle">やることをまとめて管理しましょう</p>
    </header>

    <main class="app-main">
      <!-- タスク入力セクション -->
      <section class="input-section">
        <div class="input-container">
          <input 
            type="text" 
            class="task-input" 
            placeholder="新しいタスクを入力してください"
          >
          <button class="add-button">追加</button>
        </div>
      </section>

      <!-- タスク一覧セクション -->
      <section class="task-section">
        <h2 class="section-title">タスク一覧</h2>
        
        <ul class="task-list">
        </ul>

        <!-- 空状態のメッセージ -->
        <div class="empty-state">
          <p class="empty-message">タスクがありません</p>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <p class="footer-text">© 2026 TODOアプリ</p>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
