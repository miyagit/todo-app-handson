<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODOアプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="app-header">
      <h1 class="app-title">マイTODO</h1>
      <p class="app-subtitle">やることをまとめて管理しましょう</p>
    </header>

    <main class="app-main">
      <!-- タスク入力セクション -->
      <section class="input-section">
        <div class="input-container">
          <input 
            type="text" 
            class="task-input" 
            placeholder="新しいタスクを入力してください"
            disabled
          >
          <button class="add-button" disabled>追加</button>
        </div>
      </section>

      <!-- タスク一覧セクション -->
      <section class="task-section">
        <h2 class="section-title">タスク一覧</h2>
        
        <ul class="task-list">
          <!-- サンプルタスク -->
          <li class="task-item">
            <div class="task-content">
              <input type="checkbox" class="task-checkbox" disabled>
              <span class="task-text">HTML/CSSでTODOアプリの見た目を作成</span>
            </div>
            <div class="task-actions">
              <button class="btn-edit" disabled>編集</button>
              <button class="btn-delete" disabled>削除</button>
            </div>
          </li>

          <!-- 完了済みタスク -->
          <li class="task-item is-completed">
            <div class="task-content">
              <input type="checkbox" class="task-checkbox" checked disabled>
              <span class="task-text">ReadMeの作成</span>
            </div>
            <div class="task-actions">
              <button class="btn-edit" disabled>編集</button>
              <button class="btn-delete" disabled>削除</button>
            </div>
          </li>

          <!-- 通常のタスク -->
          <li class="task-item">
            <div class="task-content">
              <input type="checkbox" class="task-checkbox" disabled>
              <span class="task-text">JavaScriptで機能実装</span>
            </div>
            <div class="task-actions">
              <button class="btn-edit" disabled>編集</button>
              <button class="btn-delete" disabled>削除</button>
            </div>
          </li>
        </ul>

        <!-- 空状態のメッセージ -->
        <div class="empty-state">
          <p class="empty-message">タスクがありません</p>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <p class="footer-text">© 2026 TODOアプリ</p>
    </footer>
  </div>
</body>
</html>
